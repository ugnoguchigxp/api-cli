name: server-package

on:
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server-package.yml'
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/server-package.yml'

jobs:
  verify-server-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
